{% extends 'core/base.html' %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-xl-9 col-lg-10">
        <div class="card shadow-sm hr-form-card">
            <div class="card-header hr-form-card-header">
                <h3 class="mb-0">{{ title }}</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% include 'core/includes/unified_form_fields.html' with form=form %}
                    <div class="d-flex justify-content-between mt-4 form-actions">
                        <a class="btn btn-secondary" href="{% url 'empleado_list' %}">Volver</a>
                        <button class="btn btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
